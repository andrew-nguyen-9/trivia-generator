# wiki_hard — continuous obscure-Wikipedia scraping for EXTREMELY HARD questions.
#
# Runs every 6 hours. Each pass mines low-pageview ("obscure") Wikipedia articles
# via `wikipedia_ingest.py --hard`, whose tiny popularity scores make the forge's
# percentile engine rank them difficulty 5. Facts accumulate idempotently (bronze
# is compacted by content_hash; the DB upserts on content_hash), so the hard bank
# grows over time without duplicating. The seed bank is re-exported and committed
# so the live site keeps getting harder even in DB-less mode.
#
# Two modes, zero config: with a DATABASE_URL secret it also upserts to Neon;
# without one it runs bronze-only (the repo is the database).
name: wiki_hard

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:
    inputs:
      count:
        description: "number of hard facts to mine this run"
        default: "40"

# Shared with etl_daily: a single "bank-writer" group serializes BOTH workflows so
# they can never push the seed bank concurrently (the push-race root cause).
concurrency:
  group: bank-writer
  cancel-in-progress: false

jobs:
  scrape-hard:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the refreshed bank
      issues: write # open the pipeline-failure issue on failure
    steps:
      - uses: actions/checkout@v4
      # Bootstrap the DB before any write (same as etl_daily, PR #43). schema.sql
      # is fully idempotent (every object is `if not exists`), so a fresh Neon
      # self-heals instead of dying with UndefinedTable at forge time. psql ships
      # on ubuntu-latest. No DATABASE_URL ⇒ DB-less mode, skip.
      - name: Apply schema (idempotent)
        if: ${{ env.DATABASE_URL != '' }}
        run: psql "$DATABASE_URL" -f db/schema.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - name: Mine obscure Wikipedia facts
        continue-on-error: true
        # COUNT via env (not inline interpolation) so the dispatch input can't be
        # shell-injected; default 40.
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          COUNT: ${{ github.event.inputs.count || '40' }}
        run: python pipeline/wikipedia_ingest.py --hard "$COUNT" --random 0
      - name: Re-forge questions + daily board
        # same health floor as etl_daily: never re-export from a collapsed forge
        run: python pipeline/question_forge.py --min-questions 100
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Refresh committed seed bank
        run: python pipeline/export_seed.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Verify exported seed bank before committing
        # gates the commit, not just reports after the fact — a DB-less export
        # built from a single-source bronze (e.g. wikipedia-only) must never
        # replace a richer, multi-category committed bank.
        run: python pipeline/selftest.py
      - name: Commit bronze layer + refreshed seed bank
        run: |
          git config user.name "parlor-etl"
          git config user.email "actions@users.noreply.github.com"
          git add data/raw frontend/public/seed-questions.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: hard-question sweep [skip ci]"
          # rebase before push (no `|| true` — a failed rebase must surface, not be
          # swallowed into a doomed push). Concurrency group makes a conflict rare.
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push
      - name: Open or update the pipeline-failure issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create pipeline-failure --color B60205 \
            --description "ETL pipeline run failed" --force --repo "$REPO" || true
          body="\`${WORKFLOW}\` failed. Run: ${RUN_URL}"
          existing=$(gh issue list --repo "$REPO" --label pipeline-failure \
            --state open --limit 1 --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "🚨 ${WORKFLOW} pipeline failed" \
              --label pipeline-failure --body "$body"
          fi
