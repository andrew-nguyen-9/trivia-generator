# Daily ETL — written as an explicit DAG (extract → transform/test → publish)
# so the shape maps 1:1 onto Airflow/Dagster later (see docs/RESEARCH_DATA_PLATFORM.md).
#
# Runs in two modes with zero config changes:
# - DB-less (default): no DATABASE_URL secret → ingests accumulate in the COMMITTED
#   bronze layer (data/raw/*.jsonl, compacted by content_hash), the forge runs
#   from bronze, and publish commits bronze + the refreshed seed bank. The repo
#   is the database; the app serves the seed bank.
# - Live-DB: add a DATABASE_URL secret (a Neon Postgres connection string) and the
#   same steps also upsert facts/questions/daily_sets to Neon.
name: etl_daily

on:
  schedule:
    # Every 3h = 8 runs/day. The bank is still thin, so accumulate aggressively
    # (each run pulls fresh opentdb/jService/Wikipedia questions). The ratecap job
    # below hard-stops at 10 runs/day so manual dispatches can't blow past it.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}

# Shared across etl_daily + wiki_hard: only ONE bank writer runs at a time, so the
# two workflows can never push to the bank concurrently (the root cause of the
# week-long silent failure). cancel-in-progress: false → queue, never drop a run.
concurrency:
  group: bank-writer
  cancel-in-progress: false

jobs:
  # Hard ceiling: never run the heavy ETL more than 10×/day, whatever the trigger
  # mix (8 scheduled + manual dispatches). Counts today's runs of this workflow;
  # downstream jobs gate on `proceed`. A skipped gate is not a failure, so the
  # notify-failure job stays quiet.
  ratecap:
    runs-on: ubuntu-latest
    permissions:
      actions: read
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          today=$(date -u +%Y-%m-%d)
          count=$(gh run list --repo "$GITHUB_REPOSITORY" --workflow etl_daily.yml \
            --created "$today" --limit 50 --json databaseId --jq 'length' 2>/dev/null || echo 0)
          echo "runs today (incl. this one): $count"
          if [ "$count" -gt 10 ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::etl_daily already ran 10× today — skipping to respect the daily cap."
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  extract:
    needs: ratecap
    if: ${{ needs.ratecap.outputs.proceed == 'true' }}
    runs-on: ubuntu-latest
    # `secrets` can't be used in a step `if:` — hoist to env, gate on env below.
    env:
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      # Bootstrap the DB before any write. schema.sql is fully idempotent
      # (every object is `if not exists`) and kept current with db/migrations,
      # so a fresh Neon self-heals instead of dying with UndefinedTable. psql
      # ships on ubuntu-latest. No DATABASE_URL ⇒ DB-less mode, skip.
      - name: Apply schema (idempotent)
        if: ${{ env.DATABASE_URL != '' }}
        run: psql "$DATABASE_URL" -f db/schema.sql
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - name: Selftest (offline gates first)
        # --core-only: test the forge/recipe code with synthetic facts, not the
        # currently-committed seed bank. Gating ingestion on the latter creates a
        # deadlock — a thin/regressed bank (e.g. from a bad wiki_hard export)
        # would block the very ingestion run that refreshes it.
        run: python pipeline/selftest.py --core-only
      # ingests are continue-on-error: one flaky API must not kill the nightly
      # refresh — decay shows up in the transform job's category health report
      - name: Ingest Wikipedia
        continue-on-error: true
        run: python pipeline/wikipedia_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Ingest Deezer
        continue-on-error: true
        run: python pipeline/music_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Ingest Sleeper + ESPN
        continue-on-error: true
        run: python pipeline/sports_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Ingest restcountries
        continue-on-error: true
        run: python pipeline/geo_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Ingest TMDB (skipped without TMDB_API_KEY)
        continue-on-error: true
        if: ${{ env.TMDB_API_KEY != '' }}
        run: python pipeline/screen_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      - name: Ingest trivia APIs (opentdb + jService + QuizAPI)
        continue-on-error: true
        run: python pipeline/trivia_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          QUIZAPI_KEY: ${{ secrets.QUIZAPI_KEY }}
      - name: Ingest Wikipedia package (breadth top-up)
        continue-on-error: true
        run: python pipeline/wiki_pkg_ingest.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Upload bronze layer
        uses: actions/upload-artifact@v4
        with:
          name: bronze
          path: data/raw/

  transform:
    needs: extract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: bronze
          path: data/raw/
      - name: dbt build (models + tests gate the publish)
        working-directory: transform
        run: |
          dbt build --profiles-dir .
          dbt docs generate --profiles-dir .
      - name: Category health gate
        working-directory: transform
        # Not just a log line: fail the run if the bank has starved below a
        # board-ready spread (≥3 categories), so silent multi-source decay goes red.
        run: |
          python - <<'EOF'
          import sys, duckdb
          # native fetchall(), not .df(): DuckDB's .df() pulls pandas+numpy, which the
          # pipeline requirements don't ship — it raised ModuleNotFoundError every run.
          con = duckdb.connect("../data/parlor.duckdb")
          rows = con.sql("select * from mart_category_stats").fetchall()
          print("\n".join(str(r) for r in rows))
          n = len(rows)
          if n < 3:
              sys.exit(f"health gate: only {n} categories in the bank (floor 3) — a source has likely stopped flowing")
          EOF

  publish:
    needs: transform
    runs-on: ubuntu-latest
    permissions:
      contents: write # this job commits the refreshed bank back to the repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r pipeline/requirements.txt
      - uses: actions/download-artifact@v4
        with:
          name: bronze
          path: data/raw/
      - name: Forge questions + daily board
        # --min-questions: health floor (baseline ~335). A starved ingest forges
        # near-empty; fail loudly instead of letting export_seed keep the stale bank.
        #
        # --from-bronze: forge from the COMPLETE bronze artifact downloaded above,
        # NOT from Neon. The DB is bootstrapped fresh each run and only holds what
        # upserted successfully, so forging from it produced a starved, music-less
        # bank (0 audio rounds) that selftest then rightly refused to commit. Bronze
        # is this repo's source of truth ("the repo is the database"); forge from it.
        run: python pipeline/question_forge.py --min-questions 100 --from-bronze
      - name: Refresh committed seed bank
        # --from-bronze: re-forge the export from the same complete bronze (mirrors
        # the forge step above); never read a partially-populated Neon.
        run: python pipeline/export_seed.py --from-bronze
      - name: Verify exported seed bank before committing
        run: python pipeline/selftest.py
      - name: Commit bronze layer + refreshed seed bank
        run: |
          git config user.name "parlor-etl"
          git config user.email "actions@users.noreply.github.com"
          git add data/raw frontend/public/seed-questions.json
          git diff --cached --quiet && echo "no changes" && exit 0
          git commit -m "chore: nightly bank refresh [skip ci]"
          # rebase onto whatever landed (e.g. a wiki_hard sweep) before pushing —
          # the belt to the concurrency group's suspenders against the push race.
          git pull --rebase --autostash origin main
          git push

  # (Séance + Ladder puzzles moved to puzzles_daily.yml — they read nothing from
  # the question bank, so they don't belong in this extract→transform→publish DAG.)

  # Any failed job in the DAG trips this. Opens a pipeline-failure issue (or
  # comments on the open one, so repeated failures don't spam) — the observability
  # that was missing while the nightly silently died for a week.
  notify-failure:
    needs: [extract, transform, publish]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open or update the pipeline-failure issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh label create pipeline-failure --color B60205 \
            --description "ETL pipeline run failed" --force --repo "$REPO" || true
          body="\`${WORKFLOW}\` failed. Run: ${RUN_URL}"
          existing=$(gh issue list --repo "$REPO" --label pipeline-failure \
            --state open --limit 1 --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --repo "$REPO" --body "$body"
          else
            gh issue create --repo "$REPO" --title "🚨 ${WORKFLOW} pipeline failed" \
              --label pipeline-failure --body "$body"
          fi
